name: Nix evaluation

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Evaluate macOS and NixOS outputs
        run: nix flake check --no-build ./nix
