# color1  #a85a5a
# color2  #7a9a6a
# color3  #c4a860
# color4  #6a8a9a
# color5  #8a7090
# color6  #8a9aa8
# color7  #d4c8b0
# color8  #6a5040
# color9  #b8864a
# color10 #8aaa7a
# color11 #b89060
# color12 #7a9ab0
# color13 #9a80a0
# color14 #a0a8b0
# color15 #e4d8c0

# Catppuccin Frappé (previous)
