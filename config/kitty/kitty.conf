# =============================================================================
# Kitty Configuration - Ported from WezTerm
# =============================================================================
# This config mirrors the WezTerm setup from wezterm/my_own_tmux.lua
# Key features: tmux-like multiplexing with Ctrl+number for tabs, splits, etc.

# =============================================================================
# FONT SETTINGS
# =============================================================================
font_size 13
font_family Berkeley Mono Semicondensed
# font_family JetBrains Mono
# font_family Berkeley Mono Semicondensed
bold_font Berkeley Mono Bold Semicondensed


modify_font underline_position +2
modify_font underline_thickness 7%

# Toggle themes by changing this include line.
# include themes/cyberdream.conf
# include themes/ember.conf
include themes/kanagawa-paper.conf
# include themes/mhfu-unite.conf

# Enable ligatures for better visual consistency
# font_features Berkeley Mono

# Font rendering - Load monitor-specific settings
# To switch between monitors, use one of these commands:
#   export KITTY_MONITOR=retina && kitty  (for MacBook built-in display)
#   export KITTY_MONITOR=external && kitty  (for external FullHD monitor)
# Or use the included configs directly

# Disable ligatures if needed (uncomment to disable)
# disable_ligatures always

# =============================================================================
# CURSOR SETTINGS
# =============================================================================
cursor_shape          block
cursor_blink_interval 0
cursor_stop_blinking_after 0
disable_ligatures never

# Cursor trail (cool visual effect)
cursor_trail 3
cursor_trail_start_threshold 20

# =============================================================================
# SCROLLBACK
# =============================================================================
scrollback_lines 10000

# Use Kitty's default pager for scrollback so alternate-screen apps do not get
# captured through a custom Neovim terminal buffer.
# scrollback_pager

# =============================================================================
# MOUSE
# =============================================================================
mouse_hide_wait 3.0
copy_on_select  clipboard
strip_trailing_spaces smart

# =============================================================================
# TERMINAL BELL
# =============================================================================
enable_audio_bell no
visual_bell_duration 0.0

# =============================================================================
# WINDOW LAYOUT
# =============================================================================
#remember_window_size  no
#initial_window_width  120c
#initial_window_height 35c

window_padding_width 10

# Window decorations
hide_window_decorations titlebar-only
confirm_os_window_close 1

# macOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_show_window_title_in none
macos_titlebar_color background

pixel_scroll yes

# Background opacity
background_opacity 1
background_blur 0

# Docker BuildKit and similar tools use ANSI faint/dim for low-priority log lines.
# Keep those lines readable against the dark Kanagawa Paper background.
dim_opacity 1.0

# =============================================================================
# TAB BAR
# =============================================================================
tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_bar_margin_width 16
tab_bar_margin_height 8 8
tab_bar_align left

# Only show tabs from the active session, plus tabs with no session.
tab_bar_filter session:~ or session:^$

active_tab_font_style   normal
inactive_tab_font_style normal

# Tab title template - documented session_name + minimal directory label
tab_title_template      "{index}:{(tab.active_oldest_wd or title).rstrip('/').rsplit('/', 1)[-1] or '/'}"
active_tab_title_template "{index}:{(tab.active_oldest_wd or title).rstrip('/').rsplit('/', 1)[-1] or '/'}"

# =============================================================================
# LAYOUTS - Enable splits layout for pane management
# =============================================================================
enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical

# =============================================================================
# KEYBOARD SHORTCUTS
# =============================================================================
# Clear all default shortcuts first (optional - uncomment to start fresh)
# clear_all_shortcuts yes

# Use Ctrl as the main modifier (tmux-like)
# kitty_mod is ctrl+shift by default, but we'll define custom shortcuts

# -----------------------------------------------------------------------------
# TAB / SPACE SWITCHING
# Ctrl+1 through Ctrl+5 are intentionally passed through to Herdr tabs.
# Ctrl+Shift+1 through Ctrl+Shift+5 are intentionally passed through to Herdr spaces.
# Ctrl+6 through Ctrl+9 remain kitty tab shortcuts.
# -----------------------------------------------------------------------------
map ctrl+1
map ctrl+2
map ctrl+3
map ctrl+4
map ctrl+5
map ctrl+shift+1
map ctrl+shift+2
map ctrl+shift+3
map ctrl+shift+4
map ctrl+shift+5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

# -----------------------------------------------------------------------------
# SPLITS / PANES (PRIORITY FEATURE)
# -----------------------------------------------------------------------------
# Ctrl+/ and Ctrl+Shift+/ are intentionally passed through to Herdr.
map ctrl+/
map ctrl+shift+/
map ctrl+\ launch --location=vsplit --cwd=current --add-to-session .

# Ctrl+Alt+- - Split vertical (stacked) - matches WezTerm
# Note: ctrl+- and ctrl+= reserved for font size on Linux
map ctrl+minus launch --location=hsplit --cwd=current --add-to-session .

# -----------------------------------------------------------------------------
# PANE NAVIGATION - Ctrl+h/j/k/l are intentionally passed through to Herdr.
# -----------------------------------------------------------------------------
map ctrl+h
map ctrl+j
map ctrl+k
map ctrl+l

# -----------------------------------------------------------------------------
# TAB MANAGEMENT
# -----------------------------------------------------------------------------
# Ctrl+n is intentionally passed through to Herdr for new tab.
map ctrl+n

# Free Ctrl+Shift+Left/Right for kitty-grab word motions
map kitty_mod+left no_op
map kitty_mod+right no_op
map ctrl+page_up previous_tab
map ctrl+page_down next_tab

# Ctrl+Shift+o - New tab with opencode in current directory
map ctrl+shift+o launch --type=tab --cwd=current --add-to-session . opencode .

# Ctrl+x is intentionally passed through to Herdr for close pane.
map ctrl+x

# Ctrl+w - Rotate/swap panes (matches WezTerm's rotate)
map ctrl+w move_window_forward
map ctrl+shift+w move_window_backward

# Ctrl+z is intentionally passed through to Herdr for zoom.
map ctrl+z

# Ctrl+r is intentionally passed through to Herdr for tab rename.
map ctrl+r

# -----------------------------------------------------------------------------
# COPY MODE / SCROLLBACK
# -----------------------------------------------------------------------------
# Ctrl+f is intentionally passed through to Herdr for scrollback search/edit.
map ctrl+f

# Ctrl+Shift+V - Keyboard-driven text selection via kitty-grab
# Arrow keys move, Shift selects, Alt makes rectangular selections, Enter copies.
map ctrl+shift+v kitten kitty_grab/grab.py

# Keep a non-Cmd paste shortcut available as well
map shift+insert paste_from_clipboard

# Ctrl+space - Quick word hints (pick words with keyboard)
# map ctrl+space kitten hints --type=word --program=@


# -----------------------------------------------------------------------------
# WORKSPACE-LIKE FEATURES
# Not directly supported in Kitty like WezTerm workspaces,
# but we can use OS windows and tabs
# -----------------------------------------------------------------------------
# Ctrl+shift+p - New OS window with quick naming (launch with title)
map ctrl+shift+p launch --type=os-window --cwd=current --add-to-session .

# Ctrl+shift+r - Set window title (workspace rename equivalent)
map ctrl+shift+r set_window_title

# -----------------------------------------------------------------------------
# SESSION/PROJECT SWITCHING
# -----------------------------------------------------------------------------
# Ctrl+shift+f - Sessionizer: pick project directory, create/switch to its session
map ctrl+shift+f launch --type=overlay ~/.dotfiles/config/scripts/kitty-sessionizer.sh

# Ctrl+shift+s - Switch between sessions (fzf picker)
map ctrl+shift+s launch --type=overlay ~/.dotfiles/config/scripts/kitty-session-switcher.sh

# Ctrl+s - Toggle second-brain session, then jump back to previous session
map ctrl+s launch --type=overlay --cwd=current ~/.dotfiles/config/scripts/kitty-second-brain-toggle.sh

# Ctrl+alt+s - Save the current session back to its existing file
map ctrl+alt+s save_as_session --use-foreground-process --match=session:. .

# Ctrl+shift+a - Save the current OS window as a new reusable session file
map ctrl+shift+a save_as_session --use-foreground-process --base-dir ~/.local/share/kitty/sessions

# Ctrl+shift+x - Close the current session in one shot
map ctrl+shift+x close_session

# Ctrl+shift+d - Delete sessions
map ctrl+shift+d launch --type=overlay ~/.dotfiles/config/scripts/kitty-session-deleter.sh

# -----------------------------------------------------------------------------
# ADDITIONAL USEFUL SHORTCUTS
# -----------------------------------------------------------------------------
# Font size adjustments
map ctrl+plus change_font_size all +1.0
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+kp_add change_font_size all +1.0
map ctrl+kp_subtract change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Reload config
map ctrl+shift+f5 load_config_file

# Command palette equivalent (using Kitty's action alias)
map cmd+shift+p kitten hints --type linenum

# Open fyler in Neovim
map cmd+e send_text all \x1b[25~

# Paste (ctrl+shift+v defined in COPY MODE section above)
map cmd+v paste_from_clipboard

# Copy
map ctrl+shift+c copy_to_clipboard
map cmd+c copy_to_clipboard

# Scroll
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

# -----------------------------------------------------------------------------
# WINDOW RESIZING
# -----------------------------------------------------------------------------
# Arrow keys
map ctrl+left resize_window narrower 3
map ctrl+right resize_window wider 3
map ctrl+up resize_window taller 3
map ctrl+down resize_window shorter 3
map ctrl+shift+home resize_window reset

# Alt+Shift+h/j/k/l are intentionally passed through to Herdr for pane resizing.
map alt+shift+h
map alt+shift+j
map alt+shift+k
map alt+shift+l
map ctrl+shift+j
map ctrl+shift+k

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================
allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration enabled
#term xterm-256color

# Update check
update_check_interval 0

# Bell
window_alert_on_bell yes
bell_on_tab " 🔔"

input_delay 0
repaint_delay 2
sync_to_monitor no
wayland_enable_ime no
