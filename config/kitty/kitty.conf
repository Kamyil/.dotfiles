# =============================================================================
# Kitty Configuration - Ported from WezTerm
# =============================================================================
# This config mirrors the WezTerm setup from wezterm/my_own_tmux.lua
# Key features: tmux-like multiplexing with Ctrl+number for tabs, splits, etc.

# =============================================================================
# FONT SETTINGS
# =============================================================================
font_family      Berkeley Mono Medium Semicondensed
# font_family      Ubuntu Mono
#font_family      Iosevka Bold
# font_family      JetBrains Mono 
font_size 14
# bold_font Berkeley Mono Bold Semicondensed

modify_font underline_position +10
modify_font underline_thickness 30%

# Enable ligatures for better visual consistency
# font_features Berkeley Mono

# Font rendering - Load monitor-specific settings
# To switch between monitors, use one of these commands:
#   export KITTY_MONITOR=retina && kitty  (for MacBook built-in display)
#   export KITTY_MONITOR=external && kitty  (for external FullHD monitor)
# Or use the included configs directly

# Disable ligatures if needed (uncomment to disable)
# disable_ligatures always

# =============================================================================
# CURSOR SETTINGS
# =============================================================================
cursor_shape          block
cursor_blink_interval 0
cursor_stop_blinking_after 0
# Cursor color (MHFU previous)
# cursor #b89060
# cursor_text_color #1a1816
# Cursor color (Catppuccin Frappé previous)
# cursor #f2d5cf
# cursor_text_color #303446
# Cursor color (Catppuccin Mocha muted)
# cursor #bac2de
# cursor_text_color #1e1e2e
# Cursor color (Catppuccin Mocha extra-muted)
# cursor #aeb6d0
# cursor_text_color #252535
# Cursor color (Kanagawa Paper Ink)
cursor #c4b28a
cursor_text_color #B1A383

# Cursor trail (cool visual effect)
cursor_trail 3
cursor_trail_decay 0.1 0.3
cursor_trail_start_threshold 2

# =============================================================================
# SCROLLBACK
# =============================================================================
scrollback_lines 10000

# Use nvim for scrollback - gives full vim visual mode (v, V, Ctrl+v)
# Based on justinmk's (neovim core) recommendation
# q to quit, full vim keybindings for selection and yanking
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist nonumber norelativenumber signcolumn=no' +'$' -

# =============================================================================
# MOUSE
# =============================================================================
mouse_hide_wait 3.0
copy_on_select  clipboard
strip_trailing_spaces smart

# =============================================================================
# TERMINAL BELL
# =============================================================================
enable_audio_bell no
visual_bell_duration 0.0

# =============================================================================
# WINDOW LAYOUT
# =============================================================================
#remember_window_size  no
#initial_window_width  120c
#initial_window_height 35c

window_padding_width 10

# Window decorations
hide_window_decorations titlebar-only
confirm_os_window_close 1

# macOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_show_window_title_in none
macos_titlebar_color background

pixel_scroll yes

# Background opacity
#background_opacity 0.9
#background_blur 20
background_opacity 1.0
background_blur 0

# Pane/split border colors (MHFU Pokke Village previous)
# active_border_color   #6a5040
# inactive_border_color #2a2520
# Pane/split border colors (Catppuccin Frappé previous)
# active_border_color   #8caaee
# inactive_border_color #51576d
# Pane/split border colors (Catppuccin Mocha muted)
# active_border_color   #6c7086
# inactive_border_color #313244
# Pane/split border colors (Catppuccin Mocha extra-muted)
# active_border_color   #5a637e
# inactive_border_color #313246
# Pane/split border colors (Kanagawa Paper Ink)
active_border_color   #2D2B35
inactive_border_color #201F27

# =============================================================================
# COLOR SCHEME - Rose Pine Custom (Ghostty -> Kitty)
# Inspired by your MHFU Pokke Village setup for warm accents elsewhere.
# =============================================================================
# Based on Monster Hunter Freedom Unite – Pokke Village colorscheme

