git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --syntax-theme=gruvmax-fang
      # pager: difft
      # externalDiffCommand: difft --color=always
      # externalDiffCommand: difft --color=always --display=inline --syntax-highlight=on


gui:
  language: en
  theme:
    activeBorderColor:
      - '#698a9b'
    inactiveBorderColor:
      - '#2A2A37'
    optionsTextColor:
      - '#c4b28a'
    selectedLineBgColor:
      - '#363646'
    selectedRangeBgColor:
      - '#363646'
    cherryPickedCommitBgColor:
      - '#393836'
    cherryPickedCommitFgColor:
      - '#c4b28a'
    unstagedChangesColor:
      - '#c4746e'
    defaultFgColor:
      - '#DCD7BA'
    searchingActiveBorderColor:
      - '#8ea49e'
    stagedChangesColor:
      - '#699469'
    markedBaseCommitFgColor:
      - '#9e9b93'
    markedBaseCommitBgColor:
      - '#393836'
authorColors:
  '*': '#8ea49e'
