<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
 </match>
 
 <!-- Disable hinting for smoother rendering -->
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>false</bool>
  </edit>
 </match>
 
 <!-- Disable hintstyle when hinting is off -->
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintnone</const>
  </edit>
 </match>
 
 <!-- Keep antialiasing enabled -->
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
 
 <!-- Use RGB subpixel rendering with default filter -->
 <match target="font">
  <edit mode="assign" name="lcdfilter">
   <const>lcddefault</const>
  </edit>
 </match>
 
 <!-- Prefer the repaired SemiBold SemiCondensed face for generic monospace. -->
 <match target="pattern">
  <test name="family" qual="any">
   <string>monospace</string>
  </test>
  <edit name="family" mode="prepend" binding="strong">
   <string>Berkeley Mono SemiBold SemiCondensed</string>
  </edit>
 </match>

 <dir>~/fonts</dir>
</fontconfig>
