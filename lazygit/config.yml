git:
  pagers:
    - colorArg: always
      pager: hunk pager --theme custom
      # pager: delta --dark --paging=never --syntax-theme=gruvmax-fang
      # pager: difft
      # externalDiffCommand: difft --color=always
      # externalDiffCommand: difft --color=always --display=inline --syntax-highlight=on

customCommands:
  - key: '<c-g>'
    context: 'global'
    command: 'hunk diff --theme custom'
    description: 'Open Hunk diff viewer'
    output: terminal


gui:
  language: en
  theme:
    activeBorderColor:
      - '#c4b28a'
      - bold
    inactiveBorderColor:
      - '#727169'
    optionsTextColor:
      - '#c4b28a'
    selectedLineBgColor:
      - '#363646'
    selectedRangeBgColor:
      - '#363646'
    cherryPickedCommitBgColor:
      - '#393836'
    cherryPickedCommitFgColor:
      - '#c4b28a'
    unstagedChangesColor:
      - '#c4746e'
    defaultFgColor:
      - '#DCD7BA'
    searchingActiveBorderColor:
      - '#c4b28a'
      - bold
    stagedChangesColor:
      - '#699469'
    markedBaseCommitFgColor:
      - '#9e9b93'
    markedBaseCommitBgColor:
      - '#393836'
authorColors:
  '*': '#8ea49e'
