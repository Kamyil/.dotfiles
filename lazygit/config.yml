git:
  pagers:
    - colorArg: always
      pager: hunk pager --theme custom
      # pager: delta --dark --paging=never --syntax-theme=gruvmax-fang
      # pager: difft
      # externalDiffCommand: difft --color=always
      # externalDiffCommand: difft --color=always --display=inline --syntax-highlight=on

customCommands:
  - key: '<c-g>'
    context: 'global'
    command: 'hunk diff --theme custom'
    description: 'Open Hunk diff viewer'
    output: terminal


gui:
  language: en
  # Semantic ANSI colors follow the active terminal palette.
  theme:
    activeBorderColor:
      - yellow
      - bold
    inactiveBorderColor:
      - default
    optionsTextColor:
      - yellow
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - reverse
    cherryPickedCommitBgColor:
      - default
    cherryPickedCommitFgColor:
      - yellow
    unstagedChangesColor:
      - red
    defaultFgColor:
      - default
    searchingActiveBorderColor:
      - yellow
      - bold
    stagedChangesColor:
      - green
    markedBaseCommitFgColor:
      - default
    markedBaseCommitBgColor:
      - default
authorColors:
  '*': cyan
