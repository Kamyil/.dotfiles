# Semantic ANSI palette; terminal theme supplies the actual colors.
user: yellow
group: dark_grey
permission:
  read: green
  write: yellow
  exec: red
  exec-sticky: magenta
  no-access: dark_grey
date:
  hour-old: green
  day-old: cyan
  older: dark_grey
size:
  none: dark_grey
  small: yellow
  medium: cyan
  large: red
file-type:
  dir:
    uid: blue
    no-uid: blue
inode:
  valid: blue
  invalid: dark_grey
links:
  valid: cyan
  invalid: red
tree-edge: dark_grey
git-status:
  default: dark_grey
  unmodified: dark_grey
  ignored: dark_grey
  new-in-index: green
  new-in-workdir: green
  typechange: yellow
  deleted: red
  renamed: cyan
  modified: yellow
  conflicted: red
