[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="’Éł "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="’Ŗ¢ "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="’ģ▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="’×Ī "
else
    GIT_REMOTE_SYMBOL="’ćÆ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch] 
symbol = "[ŅéČ](base)’Éś "
style = "fg:branch_fg bg:base"
format =  "  [$symbol$branch]($style)[Ņé┤](base)"

# [git_status] 
# MINIMAL git status 
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "ŌćĪ${count} "
# behind   = "ŌćŻ${count} "
# diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count} "

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](orange)"
renamed    = "[┬╗${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](teal)"
stashed    = "[ŌēĪ${count} ](violet)"
conflicted = "[Ō£¢${count} ](red bold)"

ahead      = "[ŌćĪ${count} ](teal)"
behind     = "[ŌćŻ${count} ](orange)"
diverged   = "[ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count} ](violet)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "Ōøō "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true


